<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Thông tin cá nhân - Zitthenkne</title>
    <script src="../../pwa-install.js" defer></script>
    <link rel="stylesheet" href="../../style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #FCE4EC 0%, #F3E8FF 55%, #E0F2FE 100%);
            min-height: 100vh;
        }
        .animal-option.is-active {
            border-color: #FF69B4;
            background: #FFF0F6;
            box-shadow: 0 4px 12px rgba(255, 105, 180, .25);
            transform: translateY(-2px);
        }
        .color-swatch.is-active {
            box-shadow: 0 0 0 3px #fff, 0 0 0 5px #FF69B4;
            transform: scale(1.08);
        }
        /* Hiệu ứng nảy nhẹ khi đổi avatar */
        @keyframes avatar-pop { 0%{transform:scale(1)} 45%{transform:scale(1.14) rotate(-6deg)} 100%{transform:scale(1)} }
        .avatar-pop { animation: avatar-pop .45s cubic-bezier(.34,1.56,.64,1); }
        /* Confetti mừng khi lưu */
        .confetti-piece {
            position: fixed; top: -20px; width: 10px; height: 14px; z-index: 9999;
            border-radius: 2px; pointer-events: none; will-change: transform, opacity;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }
        /* Badge thay đổi chưa lưu */
        @keyframes soft-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
        .dirty-pulse { animation: soft-pulse 1.4s ease-in-out infinite; }
    </style>
</head>
<body class="text-gray-700 flex flex-col items-center px-3 py-6 sm:py-10">

    <!-- Thanh điều hướng nhỏ phía trên -->
    <div class="w-full max-w-lg flex items-center justify-between mb-4 px-1">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-[#FF69B4] bg-white/70 backdrop-blur px-3.5 py-2 rounded-xl shadow-sm border border-pink-100 transition">
            <i class="fas fa-arrow-left"></i> Trang chủ
        </a>
        <div class="flex items-center gap-2">
            <img src="../../assets/logo.png" alt="Zitthenkne" class="w-9 h-9 drop-shadow">
            <span class="font-extrabold text-[#FF69B4] text-lg hidden sm:block">Zitthenkne</span>
        </div>
    </div>

    <!-- Thẻ thông tin cá nhân -->
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl border border-pink-100 overflow-hidden fade-in">
        <!-- Header gradient + avatar trực tiếp -->
        <div class="relative bg-gradient-to-br from-[#FF69B4] to-[#D8BFD8] px-6 pt-8 pb-16 text-center overflow-hidden">
            <div class="absolute -top-6 -left-6 w-24 h-24 bg-white/10 rounded-full"></div>
            <div class="absolute -bottom-8 -right-4 w-28 h-28 bg-white/10 rounded-full"></div>
            <p id="greeting" class="text-white/90 text-sm font-semibold relative">Xin chào 👋</p>
            <h1 class="text-2xl font-extrabold text-white drop-shadow-sm relative">Thông tin cá nhân</h1>
            <p class="text-white/90 text-sm mt-1 font-medium relative">Tùy chỉnh hồ sơ và diện mạo của bạn 🐿️</p>
        </div>

        <div class="px-6 sm:px-8 pb-8 -mt-12 relative">
            <!-- Avatar lớn nổi trên header -->
            <div class="flex flex-col items-center">
                <div class="relative">
                    <div id="profile-avatar"
                        class="w-28 h-28 rounded-full flex items-center justify-center text-6xl shadow-xl ring-4 ring-white"
                        style="background:#FF69B4; color:#fff;">
                        <span id="avatar-icon">🐱</span>
                    </div>
                    <!-- Nút ngẫu nhiên hoá avatar -->
                    <button type="button" id="shuffle-avatar-btn" title="Ngẫu nhiên cho vui!"
                        class="absolute -bottom-1 -right-1 w-10 h-10 rounded-full bg-white text-[#FF69B4] shadow-lg border border-pink-100 flex items-center justify-center hover:bg-pink-50 hover:scale-110 active:scale-95 transition">
                        <i class="fas fa-dice"></i>
                    </button>
                </div>
                <p id="display-name-preview" class="font-extrabold text-gray-800 text-lg mt-3">Bạn</p>
                <span id="unsaved-badge"
                    class="hidden mt-1.5 text-[11px] font-bold text-amber-600 bg-amber-50 border border-amber-200 px-2.5 py-0.5 rounded-full dirty-pulse">
                    <i class="fas fa-circle text-[7px] mr-1 align-middle"></i>Có thay đổi chưa lưu
                </span>
            </div>

            <!-- Thống kê nhanh -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5 mt-6">
                <div class="bg-pink-50/70 rounded-2xl p-3 text-center border border-pink-100">
                    <i class="fas fa-calendar-check text-[#FF69B4] mb-1"></i>
                    <div id="stat-member-since" class="text-sm font-extrabold text-gray-800 leading-tight">—</div>
                    <div class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide">Thành viên</div>
                </div>
                <div class="bg-purple-50/70 rounded-2xl p-3 text-center border border-purple-100">
                    <i class="fas fa-layer-group text-purple-500 mb-1"></i>
                    <div id="stat-quiz-sets" class="text-base font-extrabold text-gray-800 leading-tight tabular-nums">—</div>
                    <div class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide">Bộ đề</div>
                </div>
                <div class="bg-blue-50/70 rounded-2xl p-3 text-center border border-blue-100">
                    <i class="fas fa-pen-to-square text-blue-500 mb-1"></i>
                    <div id="stat-attempts" class="text-base font-extrabold text-gray-800 leading-tight tabular-nums">—</div>
                    <div class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide">Lượt thi</div>
                </div>
                <div class="bg-amber-50/70 rounded-2xl p-3 text-center border border-amber-100">
                    <i class="fas fa-star text-amber-500 mb-1"></i>
                    <div id="stat-avg" class="text-base font-extrabold text-gray-800 leading-tight tabular-nums">—</div>
                    <div class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide">Điểm TB</div>
                </div>
            </div>

            <!-- Khu chọn linh vật -->
            <div class="mt-6">
                <label class="block text-xs font-bold text-gray-500 mb-2 ml-1 uppercase tracking-wider">
                    <i class="fas fa-paw text-pink-400 mr-1"></i> Linh vật
                </label>
                <div id="animal-grid"
                    class="grid grid-cols-7 gap-2 bg-gray-50 p-2.5 rounded-2xl border border-pink-50">
                    <!-- Các nút linh vật render bằng JS -->
                </div>
                <input type="hidden" id="avatar-animal" value="🐱">
            </div>

            <!-- Khu chọn màu nền -->
            <div class="mt-5">
                <label class="block text-xs font-bold text-gray-500 mb-2 ml-1 uppercase tracking-wider">
                    <i class="fas fa-palette text-pink-400 mr-1"></i> Màu nền
                </label>
                <div class="bg-gray-50 p-2.5 rounded-2xl border border-pink-50 flex items-center justify-between gap-3 flex-wrap">
                    <div id="color-grid" class="flex flex-wrap items-center gap-2">
                        <!-- Các ô màu render bằng JS -->
                    </div>
                    <label for="avatar-bgcolor"
                        class="flex items-center gap-2 text-xs font-semibold text-gray-500 cursor-pointer bg-white px-2.5 py-1.5 rounded-xl border border-gray-200 shadow-sm hover:border-pink-300 transition">
                        <i class="fas fa-eye-dropper text-pink-400"></i> Tùy chọn
                        <input type="color" id="avatar-bgcolor" value="#FF69B4"
                            class="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent">
                    </label>
                </div>
            </div>

            <!-- Form thông tin -->
            <div class="mt-6 space-y-4">
                <!-- Tên -->
                <div>
                    <label for="profile-name" class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Tên người dùng</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                            <i class="fas fa-user"></i>
                        </span>
                        <input id="profile-name" type="text" maxlength="40" placeholder="Nhập tên hiển thị của bạn"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#FF69B4] focus:border-[#FF69B4] focus:bg-white transition">
                    </div>
                </div>
                <!-- Email -->
                <div>
                    <label for="profile-email" class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input id="profile-email" type="email" readonly
                            class="w-full pl-11 pr-10 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 cursor-not-allowed focus:outline-none">
                        <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-300" title="Email không thể thay đổi">
                            <i class="fas fa-lock text-xs"></i>
                        </span>
                    </div>
                </div>

                <!-- Đổi mật khẩu (thu gọn) -->
                <div class="bg-gray-50 rounded-2xl border border-gray-100 overflow-hidden">
                    <button type="button" id="toggle-password-section-btn"
                        class="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-gray-100/60 transition">
                        <span class="text-sm font-bold text-gray-600 flex items-center gap-2">
                            <i class="fas fa-key text-pink-400"></i> Đổi mật khẩu
                        </span>
                        <i id="password-chevron" class="fas fa-chevron-down text-xs text-gray-400 transition-transform"></i>
                    </button>
                    <div id="password-section" class="hidden px-4 pb-4">
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input id="profile-password" type="password" placeholder="Mật khẩu mới (ít nhất 6 ký tự)" autocomplete="new-password"
                                class="w-full pl-11 pr-11 py-3 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#FF69B4] focus:border-[#FF69B4] transition">
                            <button type="button" id="toggle-password-btn" aria-label="Hiện/ẩn mật khẩu"
                                class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-[#FF69B4] transition">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <p class="text-[11px] text-gray-400 mt-2 ml-1"><i class="fas fa-circle-info mr-1"></i>Để trống nếu bạn không muốn đổi mật khẩu.</p>
                    </div>
                </div>
            </div>

            <!-- Vùng thông báo -->
            <div id="profile-message" class="hidden mt-4 text-sm font-semibold rounded-xl px-4 py-2.5 text-center"></div>

            <!-- Nút hành động -->
            <div class="mt-6 space-y-3">
                <button id="save-profile-btn"
                    class="w-full px-6 py-3 bg-gradient-to-r from-[#FF69B4] to-[#FF8DC7] text-white rounded-xl font-bold shadow-md hover:shadow-lg hover:shadow-pink-200 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-floppy-disk"></i> Lưu thay đổi
                </button>
                <button id="logout-btn"
                    class="w-full px-6 py-3 bg-white text-red-500 border-2 border-red-100 rounded-xl font-bold hover:bg-red-50 hover:border-red-300 active:scale-[0.99] transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-right-from-bracket"></i> Đăng xuất
                </button>
            </div>
        </div>
    </div>

    <p class="text-xs text-gray-400 mt-5 text-center">&copy; 2025 Zitthenk · Y23C · UMP</p>

    <!-- Script chính -->
    <script type="module" src="profile.js"></script>
</body>
</html>
