<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thùng rác - Web học tập</title>
    <link rel="icon" type="image/png" href="../../assets/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Quicksand', 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-[#FFF0F5] min-h-screen">
    <div class="max-w-2xl mx-auto p-4 md:p-6 pb-12">
        <!-- Header -->
        <div class="flex items-center justify-between gap-3 mb-6">
            <div class="flex items-center gap-3 min-w-0">
                <a href="../../index.html#libraryContent" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-[#FF69B4] hover:bg-[#FFD6E0] transition-colors shadow-sm border border-pink-100 flex-shrink-0">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="min-w-0">
                    <span class="text-xs font-semibold text-pink-400 uppercase tracking-wider">Thư viện</span>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <i class="fas fa-trash-can text-gray-400"></i> Thùng rác
                        <span id="trash-count" class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full"></span>
                    </h1>
                </div>
            </div>
            <button type="button" id="empty-trash-btn" class="hidden px-3 py-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition font-bold text-xs sm:text-sm flex items-center gap-2 focus:outline-none flex-shrink-0 shadow-sm">
                <i class="fas fa-trash-alt text-xs"></i> <span class="hidden sm:inline">Dọn sạch</span>
            </button>
        </div>

        <!-- Thông báo giữ 30 ngày -->
        <div class="flex items-center gap-2.5 text-xs text-gray-500 bg-amber-50/70 border border-amber-100 px-4 py-3 rounded-xl mb-5">
            <i class="fas fa-circle-info text-amber-400"></i>
            <span>Thư mục và bộ đề đã xóa được giữ <strong>30 ngày</strong> rồi tự động xóa vĩnh viễn. Bạn có thể khôi phục bất cứ lúc nào trước đó.</span>
        </div>

        <!-- Danh sách -->
        <div id="trash-list" class="space-y-2.5">
            <div class="text-center text-gray-400 text-sm py-12"><i class="fas fa-circle-notch fa-spin mr-2"></i>Đang tải thùng rác...</div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <script type="module" src="trash.js"></script>
</body>
</html>
