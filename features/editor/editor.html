<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trình chỉnh sửa trắc nghiệm</title>
    <script src="../../pwa-install.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== Editor-specific design system (prefix ed-) ===== */
        .ed-shell { max-width: 56rem; }

        /* Header dính trên cùng để nút Lưu luôn trong tầm tay */
        .ed-header {
            position: sticky;
            top: 0;
            z-index: 40;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
        }
        @supports (padding: env(safe-area-inset-top)) {
            .ed-header { top: env(safe-area-inset-top); }
        }

        /* Chấm trạng thái lưu */
        .ed-save-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.25rem 0.7rem;
            border-radius: 9999px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .ed-save-status .dot {
            width: 0.5rem; height: 0.5rem; border-radius: 9999px; flex-shrink: 0;
        }
        .ed-save-status.saved   { background:#dcfce7; color:#15803d; }
        .ed-save-status.saved .dot   { background:#22c55e; }
        .ed-save-status.dirty   { background:#fef3c7; color:#b45309; }
        .ed-save-status.dirty .dot   { background:#f59e0b; animation: ed-pulse 1.2s infinite; }
        .ed-save-status.saving  { background:#dbeafe; color:#1d4ed8; }
        .ed-save-status.saving .dot  { background:#3b82f6; animation: ed-pulse 0.8s infinite; }
        @keyframes ed-pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

        /* Thẻ thông tin bộ đề */
        .ed-meta-card {
            background: linear-gradient(135deg, #fff 70%, #fff5f9 100%);
            border: 1.5px solid #ffe1ec;
            border-radius: 20px;
            padding: 1.25rem;
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.18);
        }
        .ed-title-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1.5rem;
            font-weight: 800;
            color: #be185d;
            padding: 0.25rem 0;
            border-bottom: 2px dashed transparent;
            transition: border-color 0.2s;
        }
        .ed-title-input::placeholder { color: #f9a8d4; }
        .ed-title-input:focus { outline: none; border-bottom-color: #f9a8d4; }
        .ed-desc-input {
            width: 100%; border: none; background: transparent; resize: none;
            font-size: 0.9rem; color: #6b7280; padding: 0.25rem 0; margin-top: 0.25rem;
            min-height: 1.6rem; overflow: hidden;
        }
        .ed-desc-input::placeholder { color: #cbd5e1; }
        .ed-desc-input:focus { outline: none; }

        /* Dải thống kê */
        .ed-stats { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
        .ed-chip {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.32rem 0.8rem; border-radius: 9999px;
            font-size: 0.72rem; font-weight: 700;
            background: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8;
        }
        .ed-chip.ok    { background:#ecfdf5; color:#047857; border-color:#a7f3d0; }
        .ed-chip.warn  { background:#fffbeb; color:#b45309; border-color:#fde68a; }

        /* Thanh công cụ */
        .ed-toolbar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
            margin: 1rem 0 0.75rem;
        }
        .ed-search {
            flex: 1 1 180px; position: relative; min-width: 150px;
        }
        .ed-search input {
            width: 100%; border: 1.5px solid #ffe1ec; background:#fff;
            border-radius: 9999px; padding: 0.5rem 0.9rem 0.5rem 2.2rem;
            font-size: 0.85rem; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ed-search input:focus { outline:none; border-color:#f472b6; box-shadow:0 0 0 3px #fce7f3; }
        .ed-search i { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:#f9a8d4; font-size:0.8rem; }
        .ed-tool-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.5rem 0.85rem; border-radius:9999px;
            font-size:0.78rem; font-weight:700; cursor:pointer;
            background:#fff; color:#db2777; border:1.5px solid #fbcfe8;
            transition: all 0.18s ease; white-space:nowrap;
        }
        .ed-tool-btn:hover { background:#fdf2f8; transform:translateY(-1px); box-shadow:0 4px 10px -4px rgba(219,39,119,0.4); }

        /* Thẻ câu hỏi */
        .ed-qcard {
            background:#fff;
            border:1.5px solid #ffe1ec;
            border-radius:18px;
            box-shadow:0 2px 14px rgba(255,182,193,0.15);
            margin-bottom:1rem;
            overflow:hidden;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.12s, opacity 0.2s;
            animation: fadeIn 0.35s ease;
        }
        .ed-qcard:hover { box-shadow:0 8px 26px rgba(255,182,193,0.3); border-color:#fbcfe8; }
        .ed-qcard.is-incomplete { border-color:#fde68a; }
        .ed-qcard.is-incomplete:hover { box-shadow:0 8px 26px rgba(251,191,36,0.25); }
        .ed-qcard.dragging { opacity:0.4; transform:scale(0.98); }
        .ed-qcard.drop-above { box-shadow:0 -4px 0 -1px #ec4899, 0 2px 14px rgba(255,182,193,0.15); }
        .ed-qcard.drop-below { box-shadow:0 4px 0 -1px #ec4899, 0 2px 14px rgba(255,182,193,0.15); }
        .ed-qcard.is-hidden { display:none; }

        .ed-qhead {
            display:flex; align-items:center; gap:0.6rem;
            padding:0.7rem 0.9rem;
            background:linear-gradient(135deg,#fff7fa, #ffeef5);
            border-bottom:1px solid #ffe1ec;
        }
        .ed-qcard.collapsed .ed-qhead { border-bottom-color: transparent; }
        .ed-drag-handle {
            cursor:grab; color:#f9a8d4; padding:0.2rem; font-size:0.9rem;
            touch-action:none;
        }
        .ed-drag-handle:active { cursor:grabbing; }
        .ed-qnum {
            display:inline-flex; align-items:center; justify-content:center;
            min-width:1.8rem; height:1.8rem; padding:0 0.5rem;
            border-radius:9999px; background:linear-gradient(135deg,#ec4899,#f472b6);
            color:#fff; font-weight:800; font-size:0.8rem; flex-shrink:0;
            box-shadow:0 2px 6px rgba(236,72,153,0.35);
        }
        .ed-qpreview {
            flex:1; min-width:0; font-size:0.85rem; color:#6b7280; font-weight:600;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .ed-qbadge {
            display:none; align-items:center; gap:0.3rem;
            font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.03em;
            padding:0.18rem 0.5rem; border-radius:9999px;
            background:#fffbeb; color:#b45309; border:1px solid #fde68a; flex-shrink:0;
        }
        .ed-qcard.is-incomplete .ed-qbadge { display:inline-flex; }

        .ed-icon-btn {
            width:1.9rem; height:1.9rem; border-radius:9999px;
            display:inline-flex; align-items:center; justify-content:center;
            background:#fff; color:#db2777; border:1px solid #fbcfe8;
            font-size:0.78rem; cursor:pointer; flex-shrink:0;
            transition: all 0.15s ease;
        }
        .ed-icon-btn:hover { background:#fce7f3; transform:translateY(-1px); }
        .ed-icon-btn.danger { color:#ef4444; border-color:#fecaca; }
        .ed-icon-btn.danger:hover { background:#fee2e2; }
        .ed-icon-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

        .ed-qbody { padding:0.9rem; }
        .ed-qcard.collapsed .ed-qbody { display:none; }

        .ed-field-label {
            display:flex; align-items:center; gap:0.4rem;
            font-size:0.72rem; font-weight:800; color:#db2777;
            text-transform:uppercase; letter-spacing:0.04em; margin-bottom:0.4rem;
        }
        .ed-textarea {
            width:100%; border:1.5px solid #ffe1ec; background:#fffafc;
            border-radius:12px; padding:0.6rem 0.8rem; font-size:0.92rem;
            color:#374151; resize:none; overflow:hidden; min-height:2.6rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ed-textarea:focus { outline:none; border-color:#f472b6; box-shadow:0 0 0 3px #fce7f3; background:#fff; }

        /* Đáp án */
        .ed-options { display:flex; flex-direction:column; gap:0.55rem; margin-top:0.3rem; }
        .ed-option {
            border:1.5px solid #ffe1ec; border-radius:14px; padding:0.55rem 0.6rem;
            background:#fffafc; transition: all 0.18s ease;
        }
        .ed-option:hover { border-color:#fbcfe8; }
        .ed-option.is-correct {
            border-color:#86efac; background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
            box-shadow:0 2px 10px rgba(34,197,94,0.12);
        }
        .ed-option-row { display:flex; align-items:center; gap:0.55rem; }
        .ed-letter {
            width:2rem; height:2rem; border-radius:10px; flex-shrink:0;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:800; font-size:0.85rem; cursor:pointer;
            background:#fce7f3; color:#be185d; border:2px solid transparent;
            transition: all 0.15s ease; user-select:none;
        }
        .ed-letter:hover { transform:scale(1.08); }
        .ed-option.is-correct .ed-letter {
            background:linear-gradient(135deg,#22c55e,#4ade80); color:#fff;
            box-shadow:0 2px 8px rgba(34,197,94,0.4);
        }
        .ed-opt-input {
            flex:1; min-width:0; border:none; background:transparent;
            font-size:0.92rem; color:#374151; padding:0.3rem 0;
        }
        .ed-opt-input:focus { outline:none; }
        .ed-correct-tag {
            display:none; align-items:center; gap:0.25rem; font-size:0.62rem; font-weight:800;
            color:#15803d; background:#dcfce7; padding:0.15rem 0.45rem; border-radius:9999px;
            flex-shrink:0;
        }
        .ed-option.is-correct .ed-correct-tag { display:inline-flex; }
        .ed-exp-input {
            width:100%; border:none; border-top:1px dashed #f3d4e2; background:transparent;
            font-size:0.78rem; color:#9ca3af; padding:0.35rem 0 0 2.55rem; margin-top:0.35rem;
        }
        .ed-exp-input:focus { outline:none; color:#6b7280; }
        .ed-option.is-correct .ed-exp-input { border-top-color:#bbf7d0; }

        .ed-add-opt {
            display:inline-flex; align-items:center; gap:0.4rem; margin-top:0.6rem;
            padding:0.4rem 0.9rem; border-radius:9999px; cursor:pointer;
            font-size:0.78rem; font-weight:700; color:#0891b2;
            background:#ecfeff; border:1.5px dashed #a5f3fc; transition: all 0.18s ease;
        }
        .ed-add-opt:hover { background:#cffafe; border-style:solid; }

        .ed-markdown-hint {
            font-size:0.68rem; color:#b9a; margin-top:0.3rem; color:#c4b5c0;
        }

        /* Nút thêm câu hỏi lớn */
        .ed-add-q {
            width:100%; display:flex; align-items:center; justify-content:center; gap:0.6rem;
            padding:0.9rem; border-radius:16px; cursor:pointer;
            font-size:0.95rem; font-weight:800; color:#db2777;
            background:linear-gradient(135deg,#fff,#fff5f9);
            border:2px dashed #fbcfe8; transition: all 0.2s ease;
        }
        .ed-add-q:hover { background:#fdf2f8; border-color:#f472b6; transform:translateY(-2px); box-shadow:0 8px 20px -8px rgba(236,72,153,0.4); }

        /* Trạng thái rỗng */
        .ed-empty { text-align:center; padding:2.5rem 1rem; }
        .ed-empty-emoji { font-size:3rem; margin-bottom:0.5rem; }

        /* Nút Lưu nổi (FAB) trên mobile */
        .ed-fab {
            position:fixed; right:1rem; z-index:45;
            bottom:calc(1rem + env(safe-area-inset-bottom));
            width:3.5rem; height:3.5rem; border-radius:9999px;
            display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,#ec4899,#f472b6); color:#fff;
            font-size:1.2rem; border:none; cursor:pointer;
            box-shadow:0 8px 22px rgba(236,72,153,0.5);
            transition: transform 0.15s ease, opacity 0.2s ease;
        }
        .ed-fab:hover { transform:scale(1.08); }
        .ed-fab:active { transform:scale(0.94); }
        @media (min-width:768px){ .ed-fab{ display:none; } }

        /* No-results khi tìm kiếm */
        .ed-no-results { text-align:center; color:#9ca3af; font-style:italic; padding:1.5rem; }
    </style>
</head>
<body class="cute-bg min-h-screen text-sm">
    <div class="ed-shell w-full mx-auto p-2 md:p-4 pb-24 md:pb-8">
        <header class="ed-header cute-card mb-4 px-3 py-2.5 md:px-4 md:py-3 rounded-2xl">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-2 md:gap-3 min-w-0">
                    <img src="../../assets/logo.png" alt="Logo Zitthenkne" class="cute-mascot w-9 h-9 md:w-11 md:h-11 flex-shrink-0" style="object-fit:cover;margin:0;" title="Zitthenkne logo" />
                    <div class="min-w-0">
                        <h1 class="text-base md:text-xl font-extrabold text-[#FF69B4] tracking-wide truncate">Trình chỉnh sửa trắc nghiệm</h1>
                        <div id="save-status" class="ed-save-status saved mt-0.5">
                            <span class="dot"></span><span class="label">Đã lưu</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <a href="../../index.html" class="ed-tool-btn" title="Quay lại Thư viện">
                        <i class="fas fa-arrow-left"></i><span class="hidden sm:inline">Quay lại</span>
                    </a>
                    <button id="save-quiz-btn" class="cute-btn bg-gradient-to-r from-[#FF69B4] to-[#FFD6E0] px-3 py-2 md:px-4 rounded-full">
                        <i class="fas fa-save"></i> <span class="hidden sm:inline">Lưu thay đổi</span>
                    </button>
                </div>
            </div>
        </header>

        <main id="editor-container">
            <div id="loading-state" class="text-center text-gray-400 py-10">
                <i class="fas fa-spinner fa-spin mr-2"></i> Đang tải trình chỉnh sửa...
            </div>
            <!-- Nội dung trình chỉnh sửa sẽ được JS chèn vào đây -->
        </main>
    </div>

    <button id="fab-save" class="ed-fab" title="Lưu thay đổi" aria-label="Lưu thay đổi">
        <i class="fas fa-save"></i>
    </button>

    <div id="toast-container"></div>
    <script type="module" src="editor.js"></script>
</body>
</html>
